<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Session | AI Interview Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/interview.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="gradient-text">AI</span> Interview Pro
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="interview.html" class="active">Interview</a>
            <a href="coding.html">Coding</a>
            <a href="dashboard.html">Dashboard</a>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div class="interview-status">
                <span class="dot green"></span> Live: HR Round
            </div>
            <a href="index.html" class="btn btn-secondary">End Interview</a>
        </div>
    </nav>

    <main class="chat-container">
        <div class="chat-history glass-card" id="chat-history">
            <!-- Messages will be injected here -->
            <div class="message system-message">
                <div class="spinner small-spinner"></div>
                Initializing AI Interviewer...
            </div>
        </div>

        <div class="chat-input-area glass-card">
            <div class="feedback-toast hidden" id="feedback-toast">
                <span id="score-badge" class="score-badge">8/10</span>
                <span id="feedback-text">Good answer, but try to expand more.</span>
            </div>
            
            <form id="chat-form" class="chat-form">
                <textarea id="answer-input" placeholder="Type your answer here..." required rows="3"></textarea>
                <div class="chat-actions">
                    <button type="button" class="btn btn-secondary" id="speak-btn">🎤 Speak</button>
                    <button type="submit" class="btn btn-primary" id="submit-btn">Send Answer</button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/interview.js"></script>
</body>
</html>
